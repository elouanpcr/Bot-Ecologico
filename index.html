<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EcoBot Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h1>🌱 EcoBot</h1>
    <h2>Clasifica residuos fácilmente ♻️</h2>

    <form method="POST">
        <input type="text" name="item" placeholder="Ej: vidrio, papel..." required>
        <button type="submit">Clasificar</button>
    </form>

    {% if resultado %}
        <div class="card">
            <h3>♻️ {{ resultado.nombre }}</h3>
            <p><strong>Categoría:</strong> {{ resultado.category }}</p>
            <p><strong>Acción:</strong> {{ resultado.action }}</p>
            <p><strong>Consejo:</strong> {{ resultado.tips }}</p>
        </div>
    {% endif %}

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>

</body>
</html>
